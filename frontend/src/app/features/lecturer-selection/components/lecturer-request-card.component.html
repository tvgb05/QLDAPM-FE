<div [class]="cardClass">
  <div class="flex items-center gap-4 w-full md:w-auto flex-1">
    <div [class]="initialsClass(group.tone)">{{ group.initials }}</div>
    <div class="flex-1">
      <div class="flex items-center gap-2 mb-0.5">
        <h4 class="font-bold text-slate-800 text-base group-hover:text-blue-600 transition">
          {{ group.name }}
        </h4>
        <span class="text-[12px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-mono">
          {{ group.studentId }}
        </span>
      </div>
      <p class="text-xs text-slate-600 line-clamp-1">
        <span class="font-bold text-slate-700">Chuyên ngành đồ án:</span>
        {{ group.specialization }}
      </p>
    </div>
  </div>
  <div class="flex items-center gap-2 w-full md:w-auto">
    @if (!readonlyMode && group.decision === 'none') {
      <button
        (click)="action.emit('reject')"
        [disabled]="processing"
        class="flex-1 md:flex-none px-4 py-2 border border-slate-200 text-slate-600 rounded-lg text-xs font-bold hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition disabled:opacity-50"
      >
        Từ chối
      </button>
      <button
        (click)="action.emit('approve')"
        [disabled]="processing"
        class="flex-1 md:flex-none px-4 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700 shadow-sm transition disabled:opacity-50"
      >
        Duyệt
      </button>
    } @else {
      <span [class]="decisionBadgeClass(group.decision === 'none' ? 'approved' : group.decision)">
        {{ readonlyMode ? 'Đã tiếp nhận' : decisionLabel(group.decision) }}
      </span>
    }
  </div>
</div>
