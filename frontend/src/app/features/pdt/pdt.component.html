<div class="bg-slate-50 font-sans text-slate-800 flex flex-col min-h-screen overflow-hidden">
  <app-header
    [role]="role"
    [userName]="userName"
    [userBadge]="userBadge"
    [notifications]="notifications"
    [showNotifications]="showNotifications"
    [showRoleSwitch]="false"
    (toggleNotifications)="toggleNotifications()"
    (clearNotifications)="clearNotifications()"
  />

  <div class="flex flex-1 overflow-hidden">
    <app-pdt-admin-sidebar [activeTab]="activeTab" (tabChange)="switchAdminTab($event)" />

    <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50/50 legacy-scroll">
      <div class="max-w-6xl mx-auto pb-10">
        <div class="fade-in space-y-6">
          @if (activeTab === 'time') {
            <app-pdt-time-tab (notify)="addNotification($event)" />
          }

          @if (activeTab === 'topics') {
            <app-pdt-topics-tab (notify)="addNotification($event)" />
          }

          @if (activeTab === 'allocation') {
            <app-pdt-allocation-tab (notify)="addNotification($event)" />
          }

          @if (activeTab === 'report') {
            <app-pdt-report-tab (notify)="addNotification($event)" />
          }
        </div>
      </div>
    </main>
</div>
