<div class="bg-slate-50 min-h-screen font-sans text-slate-800 flex flex-col overflow-hidden">
  <app-header [role]="role" [userName]="userName" [userBadge]="userBadge" [notifications]="notifications" [showNotifications]="showNotifications" (roleChange)="switchRole($event)" (toggleNotifications)="toggleNotifications()" (clearNotifications)="clearNotifications()" />
  <div class="flex flex-1 overflow-hidden">
    <app-project-timeline [timeline]="timeline" />
    <main class="flex-1 overflow-y-auto p-4 md:p-8">
  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
      <div class="flex justify-between items-start mb-6">
        <div>
          <h2 class="text-2xl font-bold">Đăng ký đề tài</h2>
          <p class="text-sm text-slate-500">Port từ `GD3/dangkydoan/dangkydetai.html` sang Angular.</p>
        </div>
        <span class="px-3 py-1 rounded-lg text-xs font-bold" [class]="topic.status === 'approved' ? 'bg-green-100 text-green-700' : topic.status === 'rejected' ? 'bg-red-100 text-red-700' : topic.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-slate-100 text-slate-600'">
          {{ topic.status }}
        </span>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold mb-2">Tên đề tài (Tiếng Việt)</label>
          <input [(ngModel)]="topic.vi" name="topicVi" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" />
        </div>
        <div>
          <label class="block text-sm font-bold mb-2">Tên đề tài (Tiếng Anh)</label>
          <input [(ngModel)]="topic.en" name="topicEn" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm" />
        </div>
        <div>
          <label class="block text-sm font-bold mb-2">Mô tả & Công nghệ</label>
          <textarea [(ngModel)]="topic.desc" name="topicDesc" rows="5" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm"></textarea>
        </div>
        <div class="pt-4 border-t border-slate-100 flex justify-end">
          <button (click)="submitTopic()" class="px-6 py-2.5 rounded-xl text-sm font-bold bg-blue-600 text-white">Gửi đề tài</button>
        </div>
      </div>
    </div>

    <div class="space-y-6">
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="p-4 border-b border-slate-100 bg-slate-50">
          <span class="text-sm font-bold text-slate-700">Thành viên nhóm</span>
        </div>
        <div class="divide-y divide-slate-100">
          @for (member of members; track member.id) {
            <label class="p-4 flex items-center justify-between gap-3">
              <div>
                <p class="text-sm font-bold text-slate-800">{{ member.name }}</p>
                <p class="text-xs text-slate-500 font-mono">{{ member.id }}</p>
              </div>
              <input type="radio" name="leader" [checked]="member.leader" (click)="updateLeader(member.id)" />
            </label>
          }
        </div>
      </div>

      <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm cursor-pointer" (click)="openLecturerModal()">
        <h3 class="font-bold text-slate-800">Preview giảng viên</h3>
        <p class="text-sm text-slate-500 mt-2">Mở modal duyệt đề tài theo UI gốc.</p>
      </div>
    </div>
  </div>

  @if (lecturerModalOpen) {
    <div class="fixed inset-0 bg-slate-900/40 flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl w-full max-w-2xl p-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-bold text-lg">Duyệt đề tài</h3>
          <button (click)="closeLecturerModal()" class="text-sm text-slate-500">Đóng</button>
        </div>
        <p class="text-sm text-slate-600 mb-4">{{ topic.vi }}</p>
        <div class="flex justify-end gap-2">
          <button (click)="rejectTopic()" class="px-4 py-2 border border-red-200 text-red-600 rounded-lg text-sm font-bold">Từ chối</button>
          <button (click)="approveTopic()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold">Duyệt</button>
        </div>
      </div>
    </div>
  }
    </main>
  </div>
</div>
