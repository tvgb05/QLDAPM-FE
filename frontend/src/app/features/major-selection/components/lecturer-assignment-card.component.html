<div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden group">
  <div
    class="absolute -right-6 -top-6 w-24 h-24 rounded-full opacity-50 group-hover:scale-110 transition"
    [class]="assignment.color === 'blue' ? 'bg-blue-50' : 'bg-purple-50'"
  ></div>
  <div class="relative z-10">
    <div class="flex justify-between items-start mb-4">
      <div [class]="getIconClass()">
        <lucide-icon [img]="icons[assignment.icon]" class="w-6 h-6"></lucide-icon>
      </div>
      <span class="px-3 py-1 bg-green-50 text-green-700 text-[10px] font-bold uppercase rounded-full border border-green-100">
        Đã phân công
      </span>
    </div>

    <h3 class="text-lg font-bold text-slate-800 mb-1">{{ assignment.name }}</h3>
    <p class="text-xs text-slate-500 mb-4">{{ assignment.faculty }}</p>

    <div class="space-y-2 pt-4 border-t border-slate-100">
      <div class="flex justify-between text-xs">
        <span class="text-slate-500">Mã học phần:</span>
        <span class="font-mono font-bold text-slate-700">{{ assignment.subjectCode }}</span>
      </div>
      <div class="flex justify-between text-xs">
        <span class="text-slate-500">Chỉ tiêu hướng dẫn:</span>
        <span class="font-bold" [class]="assignment.color === 'blue' ? 'text-blue-600' : 'text-purple-600'">
          {{ assignment.quota }}
        </span>
      </div>
    </div>
  </div>
</div>
