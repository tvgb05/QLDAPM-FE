<div class="min-h-screen bg-gradient-to-br from-blue-50 via-slate-100 to-blue-100 flex items-center justify-center p-4 font-sans text-slate-800">
  <div class="bg-white w-full max-w-md p-8 md:p-10 rounded-3xl shadow-2xl border border-white/50">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-black text-blue-900 uppercase tracking-tight">Hệ thống Quản lý Đồ án</h1>
      <p class="text-sm text-slate-500 font-medium mt-1">Khoa Khoa học & Kỹ thuật Máy tính</p>
    </div>

    <form class="space-y-6" (ngSubmit)="login()">
      <div class="space-y-1">
        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Mã số / Email</label>
        <input
          [(ngModel)]="username"
          name="username"
          type="text"
          class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium"
          placeholder="Nhập MSSV hoặc Email trường"
        />
      </div>

      <div class="space-y-1">
        <div class="flex justify-between items-center ml-1">
          <span class="text-xs font-bold text-slate-500 uppercase">Mật khẩu</span>
          <a href="" class="text-xs font-bold text-blue-600">Quên mật khẩu?</a>
        </div>
        <div class="flex gap-2">
          <input
            [(ngModel)]="password"
            name="password"
            [type]="showPassword ? 'text' : 'password'"
            class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium"
            placeholder="Nhập mật khẩu"
          />
          <button type="button" (click)="togglePassword()" class="px-4 rounded-xl border border-slate-200 text-sm">
            {{ showPassword ? 'Ẩn' : 'Hiện' }}
          </button>
        </div>
      </div>

      <button type="submit" class="w-full py-4 bg-blue-700 text-white rounded-xl font-bold text-sm" [disabled]="loading">
        {{ loading ? 'Đang xử lý...' : 'Đăng nhập hệ thống' }}
      </button>
    </form>

    @if (toast) {
      <div
        class="mt-6 px-4 py-3 rounded-xl text-sm"
        [class]="toast.type === 'success' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200'"
      >
        {{ toast.message }}
      </div>
    }
  </div>
</div>
