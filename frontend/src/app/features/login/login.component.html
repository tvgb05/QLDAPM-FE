<div class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
  <div class="w-full max-w-[720px] rounded-[2rem] bg-white shadow-[0_20px_60px_rgba(148,163,184,0.28)] border border-slate-200/80 px-8 py-10 md:px-14 md:py-12">
    <div class="text-center mb-10">
      <h1 class="text-[2.2rem] md:text-[2.7rem] font-black tracking-tight text-blue-800 leading-none">
        HỆ THỐNG QUẢN LÝ ĐỒ ÁN
      </h1>
      <p class="mt-3 text-[1.05rem] md:text-[1.15rem] font-semibold text-slate-500">
        Khoa Khoa học & Kỹ thuật Máy tính
      </p>
    </div>

    <div class="space-y-8">
      <div>
        <label class="block text-[1.05rem] font-black uppercase tracking-tight text-slate-500 mb-3">
          Mã số / Email
        </label>
        <input
          [(ngModel)]="username"
          type="text"
          placeholder="Nhập MSSV hoặc Email trường"
          class="w-full h-18 md:h-16 px-6 rounded-2xl border border-slate-200 bg-slate-50/30 text-[1.05rem] font-semibold text-slate-700 placeholder:text-slate-400 outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-300"
        />
      </div>

      <div>
        <div class="flex items-center justify-between mb-3">
          <label class="block text-[1.05rem] font-black uppercase tracking-tight text-slate-500">
            Mật khẩu
          </label>
          <button type="button" class="text-blue-600 font-bold text-[1rem] hover:text-blue-700 transition">
            Quên mật khẩu?
          </button>
        </div>

        <div class="flex gap-3">
          <input
            [(ngModel)]="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Nhập mật khẩu"
            class="flex-1 h-18 md:h-16 px-6 rounded-2xl border border-slate-200 bg-slate-50/30 text-[1.05rem] font-semibold text-slate-700 placeholder:text-slate-400 outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-300"
          />
          <button
            type="button"
            (click)="togglePassword()"
            class="h-18 md:h-16 min-w-[92px] px-6 rounded-2xl border border-slate-200 bg-white text-slate-700 text-[1.05rem] font-semibold hover:bg-slate-50 transition"
          >
            {{ showPassword ? 'Ẩn' : 'Hiện' }}
          </button>
        </div>
      </div>

      <button
        type="button"
        (click)="login()"
        [disabled]="loading"
        class="w-full h-18 md:h-16 rounded-2xl bg-blue-700 text-white text-[1.2rem] font-black shadow-[0_12px_30px_rgba(37,99,235,0.28)] hover:bg-blue-800 transition disabled:opacity-70 disabled:cursor-not-allowed"
      >
        {{ loading ? 'Đang đăng nhập...' : 'Đăng nhập hệ thống' }}
      </button>
    </div>

    @if (toast) {
      <div
        class="mt-6 rounded-2xl px-5 py-4 text-sm font-semibold border"
        [class]="toast.type === 'success'
          ? 'bg-green-50 text-green-700 border-green-200'
          : 'bg-red-50 text-red-700 border-red-200'"
      >
        {{ toast.message }}
      </div>
    }
  </div>
</div>
